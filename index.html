<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MindAR + Phone Pop</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }
    </style>

    <script>
      AFRAME.registerComponent("pop-phone", {
        init() {
          const model = this.el.querySelector("#phoneModel");

          // start hidden until marker found
          model.setAttribute("visible", false);

          const show = () => {
            model.setAttribute("visible", true);

            // pop animation (scale up)
            model.setAttribute("scale", "0.001 0.001 0.001");
            model.setAttribute("animation__pop", {
              property: "scale",
              to: "1 1 1",
              dur: 450,
              easing: "easeOutBack"
            });

            // play glb animation (first clip) on loop
            model.setAttribute("animation-mixer", {
              clip: "*",
              loop: "repeat",
              timeScale: 1
            });
          };

          const hide = () => {
            model.setAttribute("visible", false);
            model.removeAttribute("animation-mixer");
          };

          this.el.addEventListener("targetFound", show);
          this.el.addEventListener("targetLost", hide);
        }
      });
    </script>
  </head>

  <body>
    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiScanning: true; uiLoading: true;"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
    >
      <a-assets>
        <a-asset-item id="phoneGLB" src="Phonemodel1.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target 0 -->
      <a-entity mindar-image-target="targetIndex: 0" pop-phone>
        <a-gltf-model
          id="phoneModel"
          src="#phoneGLB"
          position="0 0 0"
          rotation="0 0 0"
          scale="1 1 1"
        ></a-gltf-model>
      </a-entity>

      <!-- Optional light -->
      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>
    </a-scene>
  </body>
</html>
